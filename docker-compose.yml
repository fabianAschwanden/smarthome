# Lokaler Vollbetrieb auf einem Always-on-Gerät im LAN (NAS / Mini-PC).
# Hostet Backend (inkl. Frontend), PostgreSQL und den Tuya/Midea-Sidecar.
# Das iPad öffnet danach nur:  http://<server-ip>:8080
#
# Start:   docker compose up -d --build
# Logs:    docker compose logs -f app
# Stop:    docker compose down
#
# WICHTIG – Host-Netzwerk:
#   Die Geräte-Erkennung nutzt UDP-Broadcasts (Tuya 6666/6667), die ein normales
#   Docker-Bridge-Netz NICHT durchquert. Darum laufen die Container im Host-Netz
#   (network_mode: host). Das funktioniert auf Linux-NAS/Mini-PCs. Auf Docker
#   Desktop (macOS/Windows) wird host-mode nicht voll unterstützt -> dort nur zum
#   Bauen/Testen gedacht, der echte Betrieb gehört auf den Linux-Host im LAN.

services:
  db:
    image: postgres:18
    network_mode: host
    environment:
      POSTGRES_DB: smarthome
      POSTGRES_USER: smarthome
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smarthome}
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped

  sidecar:
    build:
      context: ./tools/tuya-sidecar
    network_mode: host
    environment:
      HOST: 0.0.0.0
      PORT: 8765
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    network_mode: host
    depends_on:
      - db
      - sidecar
    environment:
      # Profil 'lan': echte Geräte, kein OIDC/Login, eigene DB (siehe application.properties).
      QUARKUS_PROFILE: lan
      # Datenbank (lokaler Postgres über Host-Netz)
      DB_URL: jdbc:postgresql://localhost:5432/smarthome
      DB_USERNAME: smarthome
      DB_PASSWORD: ${DB_PASSWORD:-smarthome}
      # Sidecar im selben Host-Netz
      SMARTHOME_TUYA_SIDECAR_URL: http://localhost:8765
    # Geräte-IPs, device-ids und local-keys/Token: aus der gitignored config/.
    # Wird zur Laufzeit eingelesen (überschreibt application.properties).
    volumes:
      - ./config:/app/config:ro
    restart: unless-stopped

volumes:
  db-data:
