      <stop offset="0" stop-color="#15181d" />
      <stop offset="0.55" stop-color="#1d2128" />
      <stop offset="1" stop-color="#262a31" />
    </linearGradient>
    <radialGradient id="vig" cx="50%" cy="40%" r="80%">
      <stop offset="0.55" stop-color="#0a0c0f" stop-opacity="0" />
