<div
  class="flex min-h-screen w-full flex-col items-stretch gap-3 p-3 sm:flex-row sm:justify-center sm:gap-4 sm:p-6"
>
  <!-- Icon-Rail = Hauptnavigation. Mobil: fixe Bottom-Bar; ab sm: Sidebar links. -->
  <nav
    class="glass-panel fixed inset-x-3 bottom-3 z-20 flex flex-row items-center justify-around gap-2 rounded-[1.5rem] px-2 py-2 sm:static sm:inset-auto sm:flex-col sm:justify-start sm:gap-4 sm:rounded-[2rem] sm:px-3 sm:py-6"
  >
    <a
      routerLink="/"
      routerLinkActive="rail-btn-active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="rail-btn"
      title="Favoriten"
      aria-label="Favoriten"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M3 11.5 12 4l9 7.5" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M5 10v9h14v-9" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </a>
    <a
      routerLink="/energy"
      routerLinkActive="rail-btn-active"
      class="rail-btn"
      title="Energie"
      aria-label="Energie"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M13 2 4 14h7l-1 8 9-12h-7z" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </a>
    <a
      routerLink="/battery"
      routerLinkActive="rail-btn-active"
      class="rail-btn"
      title="Batterie"
      aria-label="Batterie"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="3" y="8" width="15" height="8" rx="2" />
        <path d="M21 11v2" stroke-linecap="round" />
        <path d="M11 9.5 9 13h3l-2 3.5" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </a>
    <a
      routerLink="/switch"
      routerLinkActive="rail-btn-active"
      class="rail-btn"
      title="Schalter"
      aria-label="Schalter"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="3" y="6" width="18" height="12" rx="6" />
        <circle cx="9" cy="12" r="3" fill="currentColor" stroke="none" />
      </svg>
    </a>
    <a
      routerLink="/covers"
      routerLinkActive="rail-btn-active"
      class="rail-btn"
      title="Storen"
      aria-label="Storen"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="4" y="3" width="16" height="4" rx="1" />
        <path d="M6 7v8M10 7v8M14 7v8M18 7v8" stroke-linecap="round" />
        <path d="M4 15h16" stroke-linecap="round" />
      </svg>
    </a>
    <a
      routerLink="/wellness"
      routerLinkActive="rail-btn-active"
      class="rail-btn"
      title="Wellness"
      aria-label="Wellness"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M12 3c3 4 5 6.5 5 9a5 5 0 0 1-10 0c0-2.5 2-5 5-9z" stroke-linejoin="round" />
      </svg>
    </a>
    <a
      routerLink="/climate"
      routerLinkActive="rail-btn-active"
      class="rail-btn"
      title="Klima"
      aria-label="Klima"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path
          d="M12 2v20M12 6 8.5 3.5M12 6l3.5-2.5M12 18l-3.5 2.5M12 18l3.5 2.5M3.3 7l17.4 10M3.3 7l1 4M3.3 7l4-1M20.7 17l-4 1M20.7 17l-1-4M20.7 7 3.3 17M20.7 7l-4-1M20.7 7l-1 4M3.3 17l1-4M3.3 17l4 1"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </a>
    <a
      routerLink="/cameras"
      routerLinkActive="rail-btn-active"
      class="rail-btn"
      title="Kameras"
      aria-label="Kameras"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path
          d="M2 7a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2zM15 10l5-3v10l-5-3z"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </a>
    <a
      routerLink="/settings"
      routerLinkActive="rail-btn-active"
      class="rail-btn"
      title="Einstellungen"
      aria-label="Einstellungen"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="12" r="3" />
        <path
          d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </a>
  </nav>

  <!-- Hauptpanel. Unten extra Platz, damit Inhalt nicht hinter der mobilen Bottom-Bar liegt. -->
  <section class="glass-panel relative flex min-w-0 flex-1 flex-col p-4 pb-24 sm:p-7 sm:pb-7">
    <!-- Topbar -->
    <header class="flex items-center justify-between gap-3">
      <label class="glass hidden max-w-xl flex-1 items-center gap-3 rounded-full px-5 py-3 sm:flex">
        <svg
          class="size-5 shrink-0 opacity-60"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
        >
          <circle cx="11" cy="11" r="7" />
          <path d="m20 20-3-3" stroke-linecap="round" />
        </svg>
        <input
          type="text"
          placeholder="Insert command or search something"
          class="w-full bg-transparent text-sm outline-none placeholder:text-[color:var(--ink-faint)]"
        />
      </label>

      <!-- Mobil: Titel statt Suchfeld -->
      <span class="text-lg font-semibold sm:hidden">Smart Home</span>

      <div class="flex items-center gap-2 sm:gap-3">
        <app-notification-bell />
        <div class="glass flex items-center gap-3 rounded-full py-1 pl-1 pr-1 sm:pr-4">
          <span
            class="flex size-9 items-center justify-center rounded-full bg-[color:var(--accent)] text-white"
          >
            <svg
              class="size-5"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              aria-hidden="true"
            >
              <path
                d="M4 11l8-7 8 7M6 10v9h12v-9M10 19v-5h4v5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </span>
          <span class="hidden text-sm font-medium sm:inline">Zuhause</span>
        </div>
      </div>
    </header>

    <!-- Inhalt (Feature-Routen) -->
    <main class="mt-5 min-h-0 flex-1 sm:mt-6">
      <router-outlet />
    </main>

    <!-- Raum-Tabs (automatisch aus den konfigurierten Geräten): filtert die Seiten.
         "Alle" zeigt alles; ein Raum filtert hart. Mobil horizontal scrollbar. -->
    @if (rooms().length > 0) {
      <div class="mt-5 flex justify-center overflow-x-auto sm:mt-6">
        <div class="glass flex items-center gap-1 rounded-full p-1.5">
          <button
            type="button"
            class="seg shrink-0 px-4 py-2 text-sm sm:px-5"
            [attr.data-active]="activeRoom() === null"
            (click)="selectRoom(null)"
          >
            Alle
          </button>
          @for (room of rooms(); track room) {
            <button
              type="button"
              class="seg shrink-0 px-4 py-2 text-sm sm:px-5"
              [attr.data-active]="room === activeRoom()"
              (click)="selectRoom(room)"
            >
              {{ room }}
            </button>
          }
        </div>
      </div>
    }
  </section>
</div>
