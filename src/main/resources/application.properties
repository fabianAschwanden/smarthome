quarkus.application.name=smarthome

# --- Persistenz: Liquibase besitzt das Schema, Hibernate validiert nur (Blueprint §6) ---
quarkus.hibernate-orm.database.generation=validate
quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.change-log=db/changelog/db.changelog-master.xml
# Dev/Test: PostgreSQL kommt automatisch über Dev Services (Container-Runtime nötig)

# --- Frontend via Quinoa (Blueprint §1) ---
quarkus.quinoa.ui-dir=webapp
quarkus.quinoa.build-dir=dist/webapp/browser
quarkus.quinoa.enable-spa-routing=true
%dev.quarkus.quinoa.dev-server.port=4200

# --- AuthN/AuthZ: OIDC BFF-Pattern (Blueprint §8) ---
# Session-Cookie statt Token im Browser; Rollen aus Client-Rollen des IdP.
quarkus.oidc.application-type=web-app
quarkus.oidc.authentication.pkce-required=true
quarkus.oidc.roles.source=accesstoken
# Client-Rollen aus resource_access/<client>/roles lesen (Keycloak):
quarkus.oidc.roles.role-claim-path=resource_access/${OIDC_CLIENT_ID:smarthome}/roles

# --- Profile (Blueprint §9): Auth in Dev/Test aus, in Prod an ---
%dev.quarkus.oidc.enabled=false
%dev.quarkus.keycloak.devservices.enabled=false
# Dev-Server im LAN erreichbar machen (Zugriff von Handy/Tablet/anderem Rechner
# unter http://<diese-IP>:8080). Quarkus bindet im Dev-Modus sonst nur an localhost.
%dev.quarkus.http.host=0.0.0.0

%test.quarkus.oidc.enabled=false
%test.quarkus.keycloak.devservices.enabled=false
%test.quarkus.quinoa.enabled=false
%test.quarkus.http.test-port=0
# SICHERHEIT: Tests dürfen NIE echte Geräte ansteuern. Hart auf Mock gepinnt –
# überschreibt Env-Var SMARTHOME_REAL_DEVICES und etwaige config/-Einträge im %test-Profil.
%test.smarthome.real-devices=false

# --- Geräte-Schalter (Build-Property): true => echte Adapter, sonst Mock-Adapter ---
# Build-time-Property (@IfBuildProperty). Per Env-Var SMARTHOME_REAL_DEVICES=true direkt
# erzwingbar – unabhängig von der Profil-Reihenfolge (additive Profile greifen bei
# build-time-Properties im Dev-Modus nicht zuverlässig). In %prod/%live default true.
smarthome.real-devices=${SMARTHOME_REAL_DEVICES:false}
%prod.smarthome.real-devices=true
%live.smarthome.real-devices=true

# --- %lan: Heimbetrieb auf NAS/Mini-PC im LAN (docker-compose), iPad als Client ---
# Echte Geräte an, KEIN OIDC/Login (vertrauenswürdiges Heimnetz), eigene DB.
# Datenbank-Zugang per Env (siehe docker-compose.yml).
%lan.smarthome.real-devices=true
%lan.quarkus.oidc.enabled=false
%lan.quarkus.keycloak.devservices.enabled=false
%lan.quarkus.datasource.jdbc.url=${DB_URL}
%lan.quarkus.datasource.username=${DB_USERNAME:smarthome}
%lan.quarkus.datasource.password=${DB_PASSWORD:smarthome}
%lan.quarkus.hibernate-orm.database.generation=validate

# --- %live: lokaler Vollbetrieb gegen echte Geräte im LAN (additiv zu %dev nutzen:
#     ./mvnw quarkus:dev -Dquarkus.profile=dev,live). Erbt von %dev: Dev Services (DB),
#     kein OIDC, Quinoa/Live-Reload. %live schaltet nur die Adapter auf echt + setzt die IPs. ---
%live.quarkus.oidc.enabled=false
%live.quarkus.keycloak.devservices.enabled=false
# Geräte-/Haus-IPs gehören NICHT ins Repo -> in gitignored config/ (bzw. Env) setzen.

%prod.quarkus.datasource.jdbc.url=${DB_URL}
%prod.quarkus.datasource.username=${DB_USERNAME}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL}
%prod.quarkus.oidc.client-id=${OIDC_CLIENT_ID}
%prod.quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET}

# Ohne explizite Policy wären alle Endpoints trotz OIDC anonym erreichbar:
# in Prod erfordert alles Login (BFF-Redirect), ausgenommen Health für den Orchestrator.
%prod.quarkus.http.auth.permission.health.paths=/q/health,/q/health/*
%prod.quarkus.http.auth.permission.health.policy=permit
%prod.quarkus.http.auth.permission.authenticated.paths=/*
%prod.quarkus.http.auth.permission.authenticated.policy=authenticated

# --- Security-Header in Prod (Blueprint §8) ---
# style-src 'unsafe-inline': Angular injiziert Komponenten-Styles zur Laufzeit als <style>-Elemente.
%prod.quarkus.http.header."Content-Security-Policy".value=default-src 'self'; style-src 'self' 'unsafe-inline'
%prod.quarkus.http.header."Referrer-Policy".value=no-referrer
%prod.quarkus.http.header."Permissions-Policy".value=camera=(), microphone=(), geolocation=()

# --- Fly.io-Profil (additiv zu %prod): Neon PostgreSQL + Fly-Eigenheiten ---
# Aktiviert via QUARKUS_PROFILE=prod,fly in fly.toml.
# Secrets via flyctl secrets set DB_URL=... OIDC_AUTH_SERVER_URL=... OIDC_CLIENT_ID=... OIDC_CLIENT_SECRET=...
#
# Neon: Connection-Pooling über den Neon-Proxy-Endpunkt verwenden (Port 5432, ?sslmode=require).
# Die DB_URL hat das Format:
#   jdbc:postgresql://<host>.neon.tech/<dbname>?sslmode=require
%fly.quarkus.datasource.jdbc.url=${DB_URL}
%fly.quarkus.datasource.username=${DB_USERNAME:}
%fly.quarkus.datasource.password=${DB_PASSWORD:}

# Neon trennt Verbindungen aggressiv — kurze max-lifetime vermeidet "connection is closed"-Fehler.
%fly.quarkus.datasource.jdbc.max-size=5
%fly.quarkus.datasource.jdbc.min-size=0
%fly.quarkus.datasource.jdbc.idle-removal-interval=PT1M
%fly.quarkus.datasource.jdbc.max-lifetime=PT3M

# Fly-interne Healthcheck-URL ohne Auth (ergänzt die %prod-Policy)
%fly.quarkus.http.auth.permission.fly-health.paths=/q/health/live,/q/health/ready
%fly.quarkus.http.auth.permission.fly-health.policy=permit

# Fly setzt PORT env var — Quarkus hört bereits auf 8080 (fly.toml internal_port)
%fly.quarkus.http.port=8080

# --- Container-Image (Release-Pipeline) ---
quarkus.container-image.name=${quarkus.application.name}

# --- Energie-Use-Case (Use Case 1) ---
# Mock-Quellen sind in %dev/%test aktiv (keine Konfiguration noetig).
# Echte Basis-URLs (Haus-IPs) NICHT ins Repo -> in gitignored config/ bzw. Env setzen:
#   energy.fronius.base-url, energy.smartfox.base-url
energy.reference-source=SMARTFOX
energy.fronius.base-url=${ENERGY_FRONIUS_BASE_URL:http://fronius.invalid}
energy.smartfox.base-url=${ENERGY_SMARTFOX_BASE_URL:http://smartfox.invalid}

# --- Batteriesteuerung (Use Case 2): SMARTFOX-Relais 1 (siehe docs/battery/SPEC.md) ---
# {state} wird durch den passenden state-Code ersetzt (state=1 EIN, state=0 AUS).
# Relais-URL enthält die Haus-IP -> NICHT ins Repo, in gitignored config/ bzw. Env setzen.
battery.smartfox.relay-url=${BATTERY_SMARTFOX_RELAY_URL:http://smartfox.invalid/setswrel.cgi?rel=1&state={state}}
battery.smartfox.state-on=1
battery.smartfox.state-off=0
# Auto-Modus: Hysterese-Schwellen fuer das Ueberschuss-Laden (Watt Einspeisung).
battery.auto.charge-on-watt=1500
battery.auto.charge-off-watt=300
# Auswerteintervall des Auto-Modus.
battery.auto.tick-interval=3s

# --- Zeitsteuerung (Use Case 4): Auswerteintervall des Schedule-Runners ---
schedule.tick-interval=30s
# Scheduler erzwingen (auch im Dev-Modus aktiv, unabhängig von Request-Traffic).
quarkus.scheduler.start-mode=forced

# ==============================================================================
# WICHTIG: Geräte-Identifier (device-id), local-keys/token und IP-Adressen sind
# hausspezifisch und gehören NICHT ins Repo. Sie werden ausschliesslich in der
# gitignored Datei config/application.properties (bzw. per Env-Var) gesetzt; hier
# stehen nur neutrale Platzhalter. Geräte-/Raumnamen bleiben (rein fürs UI).
# ==============================================================================

# --- Tuya/Smart-Life-Geräte (Use Case 3): lokales LAN-Protokoll (siehe docs/tuya/SPEC.md) ---
# Liste beliebig vieler Geräte unter tuya.devices[i].*.
# device-id/local-key/address NUR in gitignored config/ bzw. Env (siehe oben).

# [0] Stehlampe (Wohnzimmer)
tuya.devices[0].id=stehlampe
tuya.devices[0].name=Stehlampe
tuya.devices[0].room=Wohnzimmer
tuya.devices[0].device-id=${TUYA_DEVICE_ID_STEHLAMPE:unconfigured}
tuya.devices[0].local-key=${TUYA_LOCAL_KEY_STEHLAMPE:}
tuya.devices[0].address=${TUYA_ADDRESS_STEHLAMPE:0.0.0.0}
tuya.devices[0].version=3.3
tuya.devices[0].dp=1

# [1] Palmenbeleuchtung (Garten)
tuya.devices[1].id=palmenbeleuchtung
tuya.devices[1].name=Palmenbeleuchtung
tuya.devices[1].room=Garten
tuya.devices[1].device-id=${TUYA_DEVICE_ID_PALMEN:unconfigured}
tuya.devices[1].local-key=${TUYA_LOCAL_KEY_PALMEN:}
tuya.devices[1].address=${TUYA_ADDRESS_PALMEN:0.0.0.0}
tuya.devices[1].version=3.3
tuya.devices[1].dp=1

# [2] Carport-Schalter (Garten)
tuya.devices[2].id=carport
tuya.devices[2].name=Carport
tuya.devices[2].room=Garten
tuya.devices[2].device-id=${TUYA_DEVICE_ID_CARPORT:unconfigured}
tuya.devices[2].local-key=${TUYA_LOCAL_KEY_CARPORT:}
tuya.devices[2].address=${TUYA_ADDRESS_CARPORT:0.0.0.0}
tuya.devices[2].version=3.3
tuya.devices[2].dp=1

# [3] Föhnschalter (Garten)
tuya.devices[3].id=foehn
tuya.devices[3].name=Föhnschalter
tuya.devices[3].room=Garten
tuya.devices[3].hint=Carport-Licht aus bei starkem Föhn
tuya.devices[3].device-id=${TUYA_DEVICE_ID_FOEHN:unconfigured}
tuya.devices[3].local-key=${TUYA_LOCAL_KEY_FOEHN:}
tuya.devices[3].address=${TUYA_ADDRESS_FOEHN:0.0.0.0}
tuya.devices[3].version=3.3
tuya.devices[3].dp=1

# [4] Homecinema-Schalter (IP per Auto-Discovery)
tuya.devices[4].id=homecinema
tuya.devices[4].name=Homecinema
tuya.devices[4].room=Wohnzimmer
tuya.devices[4].device-id=${TUYA_DEVICE_ID_CINEMA:unconfigured}
tuya.devices[4].local-key=${TUYA_LOCAL_KEY_CINEMA:}
tuya.devices[4].version=3.3
tuya.devices[4].dp=1
# Kritisch: versorgt auch das WLAN -> AUS nur mit Bestätigung (kappt sonst die Steuerung).
tuya.devices[4].critical=true

# --- Storensteuerung (Use Case 5): Tuya-Cover (siehe docs/cover/SPEC.md) ---
# Standard-dps: controlDp=1 (open/close/stop), positionDp=2 (Soll %), stateDp=3 (Ist %).
# device-id/local-key/IP über tinytuya identifizieren; local-key nur per config/Env (Secret).
# [0] Store links
cover.devices[0].id=store-links
cover.devices[0].name=Store links
cover.devices[0].room=Wohnzimmer
cover.devices[0].device-id=${COVER_DEVICE_ID_LINKS:unconfigured}
cover.devices[0].local-key=${COVER_LOCAL_KEY_LINKS:}
cover.devices[0].address=${COVER_ADDRESS_LINKS:0.0.0.0}
cover.devices[0].version=3.3
cover.devices[0].control-dp=1
cover.devices[0].position-dp=2
cover.devices[0].state-dp=3

# [1] Store Mitte
cover.devices[1].id=store-mitte
cover.devices[1].name=Store Mitte
cover.devices[1].room=Wohnzimmer
cover.devices[1].device-id=${COVER_DEVICE_ID_MITTE:unconfigured}
cover.devices[1].local-key=${COVER_LOCAL_KEY_MITTE:}
cover.devices[1].address=${COVER_ADDRESS_MITTE:0.0.0.0}
cover.devices[1].version=3.3
cover.devices[1].control-dp=1
cover.devices[1].position-dp=2
cover.devices[1].state-dp=3

# --- Wellness-Anlagen (Use Case 6): Whirlpool & Schwimmbecken (siehe docs/appliance/SPEC.md) ---
# Steuerschnittstelle noch offen -> im Echtbetrieb vorerst "pending" (offline).
# functions: PUMP,HEATER,LIGHT,MASSAGE,FILTER (nur die vorhandenen je Anlage angeben).
appliance.devices[0].id=whirlpool
appliance.devices[0].name=Whirlpool
appliance.devices[0].room=Wellness
appliance.devices[0].functions=PUMP,HEATER,LIGHT,MASSAGE,FILTER
appliance.devices[0].temp-min=30
appliance.devices[0].temp-max=40
appliance.devices[1].id=pool
appliance.devices[1].name=Schwimmbecken
appliance.devices[1].room=Garten
appliance.devices[1].functions=PUMP,HEATER,LIGHT,FILTER
appliance.devices[1].temp-min=18
appliance.devices[1].temp-max=32

# --- Klimaanlage (Use Case 7): EIN/AUS + Soll-Temp + Modus (siehe docs/climate/SPEC.md) ---
# Midea / NetHome Plus über den lokalen Sidecar (msmart-ng, V3 token/key).
# device-id (numerisch), token, key und ip gehören als Secrets nur in config/ bzw. Env.
# Ohne vollständige Angaben bleibt das Gerät im Echtbetrieb "pending" (offline).
climate.devices[0].id=klima
climate.devices[0].name=Klimaanlage
climate.devices[0].room=Wohnzimmer
climate.devices[0].device-id=${CLIMATE_DEVICE_ID_KLIMA:}
climate.devices[0].token=${CLIMATE_TOKEN_KLIMA:}
climate.devices[0].key=${CLIMATE_KEY_KLIMA:}
climate.devices[0].address=${CLIMATE_IP_KLIMA:}

# --- Umweltsensoren (Use Case 8): Tuya-Temp/Feuchte-Sensor (nur lesend) ---
# Standard-dps: temperatureDp=1 (Rohwert ÷ temperatureScale), humidityDp=2.
# device-id/local-key nur per config/Env; IP findet TuyaDiscovery automatisch.
sensor.devices[0].id=innen
sensor.devices[0].name=Innen
sensor.devices[0].room=Wohnzimmer
sensor.devices[0].device-id=${SENSOR_DEVICE_ID_INNEN:unconfigured}
sensor.devices[0].local-key=${SENSOR_LOCAL_KEY_INNEN:}
sensor.devices[0].version=3.3
sensor.devices[0].temperature-dp=1
sensor.devices[0].humidity-dp=2
sensor.devices[0].temperature-scale=10
# 3.4/3.5-Sensoren werden über den tinytuya-Sidecar gelesen (siehe tools/tuya-sidecar/).
# Eigener Namespace (nicht unter tuya.*, das gehört der @ConfigMapping TuyaConfig).
smarthome.tuya-sidecar-url=http://127.0.0.1:8765

# --- Sicherheit (Use Case 9): Tuya-Rauchmelder (nur lesend) ---
# dps: statusDp=1 ("alarm"/"normal"), batteryDp=15 (%). IP via TuyaDiscovery.
safety.smoke[0].id=rauchmelder
safety.smoke[0].name=Rauchmelder
safety.smoke[0].room=Wohnzimmer
safety.smoke[0].device-id=${SAFETY_DEVICE_ID_SMOKE:unconfigured}
safety.smoke[0].local-key=${SAFETY_LOCAL_KEY_SMOKE:}
safety.smoke[0].version=3.3
safety.smoke[0].status-dp=1
safety.smoke[0].battery-dp=15

# --- Kameras (Use Case 11): Live-Stream über das go2rtc-Gateway (siehe docs/camera/SPEC.md) ---
# 'stream' = Name des Streams im go2rtc-Gateway. Die RTSP-URL (mit Haus-IP) steht NICHT
# hier, sondern in der gitignored go2rtc-Config (deploy/go2rtc/go2rtc.yaml).
camera.devices[0].id=garten
camera.devices[0].name=Garten
camera.devices[0].room=Garten
camera.devices[0].stream=${CAMERA_STREAM_GARTEN:garten}
